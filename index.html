<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <title>Worker-safe Canvas 二分法压缩</title>
    <style>
        .wrapper {
            display: flex;
            gap: 10px;
        }

        .item1 {
            width: 200px;
            border: 1px solid black;
        }

        .item2 {
            width: 200px;
            border: 1px solid blue;
        }

        .item3 {
            width: 200px;

            border: 1px solid orange;
        }

        .item4 {
            width: 200px;
            border: 1px solid green;
        }

        .item5 {
            width: 200px
        }
        .item5-1{
            width: 100%;
            height: 400px;
            background-color: blue;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="item1">
        2222222222222222 <br>
        23143124324134123412 <br>
        dsafsadfasd
        <br>
    </div>
    <div class="item2">1</div>
    <div class="item3">3</div>
    <div class="item4">4</div>
    <div class="item5">
        <div class="item5-1"></div>
    </div>
</div>


<script>

</script>

</body>
</html>
